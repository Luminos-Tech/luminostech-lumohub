version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumohub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumohub
      POSTGRES_PASSWORD: lumohub123
      POSTGRES_DB: lumohub_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lumohub -d lumohub_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumohub_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lumohub:lumohub123@postgres:5432/lumohub_db
      SECRET_KEY: lumohub-super-secret-key-change-in-prod-32chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: http://localhost:3000,https://lumohub.luminostech.tech
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend-web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: lumohub_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"

volumes:
  pgdata:
